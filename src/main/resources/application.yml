server:
  port: ${SERVER_PORT:${PORT:8080}}

spring:
  application:
    name: event-driven-order-delivery
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/order_delivery}
    username: ${DB_USERNAME:order_app}
    password: ${DB_PASSWORD:order_secret}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      repositories:
        enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-delivery
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.dinesh.orderdelivery.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    admin:
      auto-create: ${KAFKA_ENABLED:true}
    listener:
      auto-startup: ${KAFKA_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-256-bit-secret-for-production}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  events:
    kafka-enabled: ${KAFKA_ENABLED:true}
    topic-partitions: ${KAFKA_TOPIC_PARTITIONS:3}
    topic-replicas: ${KAFKA_TOPIC_REPLICAS:1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
