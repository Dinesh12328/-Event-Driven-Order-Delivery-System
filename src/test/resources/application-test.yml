spring:
  datasource:
    url: jdbc:h2:mem:order_delivery_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  sql:
    init:
      mode: never
  cache:
    type: simple
  kafka:
    listener:
      auto-startup: false
    admin:
      auto-create: false
app:
  events:
    kafka-enabled: false
